services:
  express-app:
    image: vcumpa/express-app:latest
    container_name: express-app
    ports:
      - "8080:8080"
    restart: always

  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    restart: always
